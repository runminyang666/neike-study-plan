<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>内科复习打卡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f0f5f9;color:#1a2a3a;min-height:100vh;line-height:1.6}
.container{max-width:640px;margin:0 auto;padding:20px}
.header{text-align:center;padding:30px 20px 20px;background:linear-gradient(135deg,#2c7da0,#1a5276);border-radius:16px;color:white;margin-bottom:20px;box-shadow:0 4px 20px rgba(26,82,118,0.2)}
.header h1{font-size:22px;font-weight:700;letter-spacing:1px;margin-bottom:4px}
.header .subtitle{font-size:14px;opacity:0.85;margin-bottom:12px}
.header .day-info{font-size:15px;background:rgba(255,255,255,0.15);display:inline-block;padding:4px 16px;border-radius:20px}
.day-progress-bg{height:4px;background:rgba(255,255,255,0.25);border-radius:2px;margin-top:8px;overflow:hidden}
.day-progress-fill{height:100%;background:white;border-radius:2px;transition:width 0.5s ease}
.stats-bar{display:flex;justify-content:space-between;align-items:center;background:white;padding:12px 20px;border-radius:12px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.stats-bar .stat{display:flex;align-items:center;gap:6px;font-size:14px;color:#555}
.stats-bar .stat .num{font-weight:700;font-size:20px;color:#2c7da0}
.stats-bar .stat .num.done{color:#27ae60}
.section{background:white;border-radius:12px;padding:16px 20px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.section-title{font-size:15px;font-weight:600;color:#2c7da0;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #e8f0f8;display:flex;align-items:center;gap:8px}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f0f3f7}
.task-item:last-child{border-bottom:none}
.task-item .checkbox{width:20px;height:20px;border:2px solid #c0d0e0;border-radius:5px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all 0.2s;background:white}
.task-item .checkbox:hover{border-color:#2c7da0}
.task-item .checkbox.checked{background:#27ae60;border-color:#27ae60}
.task-item .checkbox.checked::after{content:"\2713";color:white;font-size:13px;font-weight:bold}
.task-item .task-text{flex:1;font-size:14px;color:#333;padding-top:1px}
.task-item .task-text.done{text-decoration:line-through;color:#99b0c5}
.task-item .task-label{font-size:11px;color:#7a9bb5;background:#eef4fa;padding:1px 8px;border-radius:10px;margin-right:6px;white-space:nowrap;flex-shrink:0}
.task-item .delete-btn{color:#ccc;cursor:pointer;font-size:16px;padding:0 4px;line-height:1;flex-shrink:0}
.task-item .delete-btn:hover{color:#e74c3c}
.add-task-row{display:flex;gap:8px;margin-top:10px}
.add-task-row input{flex:1;padding:8px 12px;border:1px solid #d0dde8;border-radius:8px;font-size:14px;outline:none;transition:border-color 0.2s}
.add-task-row input:focus{border-color:#2c7da0}
.add-task-row button{padding:8px 16px;background:#2c7da0;color:white;border:none;border-radius:8px;font-size:14px;cursor:pointer;white-space:nowrap;transition:background 0.2s}
.add-task-row button:hover{background:#1a5276}
.start-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:20px}
.start-screen .logo{font-size:56px;margin-bottom:20px}
.start-screen h1{font-size:28px;color:#1a2a3a;margin-bottom:8px}
.start-screen p{font-size:15px;color:#7a8fa3;max-width:360px;margin-bottom:30px;line-height:1.8}
.start-btn{padding:14px 48px;font-size:18px;font-weight:600;color:white;background:linear-gradient(135deg,#2c7da0,#1a5276);border:none;border-radius:30px;cursor:pointer;box-shadow:0 4px 16px rgba(26,82,118,0.3);transition:transform 0.2s,box-shadow 0.2s}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(26,82,118,0.4)}
.start-btn:active{transform:translateY(0)}
.empty-state{text-align:center;padding:20px 0;color:#aab8c8;font-size:14px}
.empty-state .icon{font-size:32px;margin-bottom:8px}
.footer-actions{text-align:center;margin-top:24px;padding-bottom:40px}
.reset-btn{padding:10px 28px;font-size:14px;color:#888;background:white;border:1px solid #ddd;border-radius:20px;cursor:pointer;transition:all 0.2s}
.reset-btn:hover{color:#e74c3c;border-color:#e74c3c;background:#fff5f5}

.date-nav{display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 0;margin-bottom:2px;flex-wrap:wrap}
.date-nav button{padding:5px 12px;font-size:12px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:white;border-radius:14px;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.date-nav button:hover{background:rgba(255,255,255,0.25)}
.date-nav .date-label{font-size:14px;font-weight:500;min-width:130px;text-align:center}
.date-nav .today-btn{background:rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.4)}
.date-nav .today-btn:hover{background:rgba(255,255,255,0.35)}
</style>
</head>

<div class="container" id="startScreen">
<div class="start-screen">
<div class="logo">🩺</div>
<h1>内科滚动复习计划</h1>
<p>基于艾宾浩斯遗忘曲线，86天完整复习旅程。<br>每天推送学习内容与复习计划，点击打勾完成，进度随时可见。</p>
<button class="start-btn" onclick="startPlan()">开始计划</button>
</div></div>
<div class="container" id="mainContent" style="display:none">
<div class="header">
<h1>内科滚动复习</h1>
<div class="subtitle" id="dateDisplay"></div>
<div class="day-info" id="dayInfo"></div>

<div class="date-nav">
    <button onclick="prevDay()">‹ 前一天</button>
    <span class="date-label" id="dayLabel">第 1 天</span>
    <button onclick="nextDay()">后一天 ›</button>
    <button class="today-btn" onclick="goToToday()" title="回到当前日期">● 今天</button>
</div>

<div class="day-progress-bg"><div class="day-progress-fill" id="progressFill"></div></div>
</div>
<div class="stats-bar">
<div class="stat">✅ <span>已完成 </span><span class="num done" id="completedCount">0</span></div>
<div class="stat">📋 <span>共 </span><span class="num" id="totalCount">0</span><span> 项</span></div>
</div>
<div class="section" id="studySection">
<div class="section-title">📖 学习新内容</div>
<div id="studyContent"></div></div>
<div class="section" id="reviewSection">
<div class="section-title">🔄 复习任务</div>
<div id="reviewContent"></div></div>
<div class="section" id="customSection">
<div class="section-title">📋 其他任务</div>
<div id="customTasks"></div>
<div class="add-task-row">
<input type="text" id="newTaskInput" placeholder="添加今天需要完成的其他任务..." onkeydown="if(event.key==='Enter')addCustomTask()">
<button onclick="addCustomTask()">添加</button>
</div></div>
<div class="footer-actions">
<button class="reset-btn" onclick="confirmReset()">🔄 重置进度</button>
</div></div>

function getState(){
  try{var r=localStorage.getItem("neike_plan_state");if(r){var s=JSON.parse(r);if(s.startDate)return s}}catch(e){}return null
}
function saveState(s){localStorage.setItem("neike_plan_state",JSON.stringify(s))}
function getDayKey(d){return"day_"+d}
function getTodayPlanDay(){
  var s=getState();if(!s)return 0;
  var st=new Date(s.startDate);var t=new Date();
  t.setHours(0,0,0,0);st.setHours(0,0,0,0);
  var df=Math.floor((t-st)/(86400000))+1;
  return Math.max(1,Math.min(df,86))
}
function fmtDate(d){
  var y=d.getFullYear();var m=String(d.getMonth()+1).padStart(2,"0");
  var dd=String(d.getDate()).padStart(2,"0");
  var w=["日","一","二","三","四","五","六"];
  return y+"年"+m+"月"+dd+"日 星期"+w[d.getDay()]
}
function render(){
  var s=getState();
  if(!s||!s.startDate){
    document.getElementById("startScreen").style.display="";
    document.getElementById("mainContent").style.display="none";
    return
  }
  var pd=getTodayPlanDay();
  if(s.viewDay!==undefined)pd=s.viewDay;
  var td=planData.find(function(d){return d.d===pd});
  if(!td){
    document.getElementById("startScreen").style.display="";
    document.getElementById("mainContent").style.display="none";
    document.querySelector(".start-screen h1").textContent="🎉 计划已完成！";
    document.querySelector(".start-screen p").innerHTML="恭喜完成86天的复习计划！<br>点击下方按钮重新开始";
    document.querySelector(".start-btn").textContent="重新开始";
    return
  }
  document.getElementById("startScreen").style.display="none";
  document.getElementById("mainContent").style.display="";
  document.getElementById("dateDisplay").textContent=fmtDate(new Date());
  document.getElementById("dayLabel").textContent="第 "+pd+" 天";
  document.getElementById("dayInfo").textContent="第 "+pd+" 天 / 共 86 天";
  document.getElementById("progressFill").style.width=(pd/86*100)+"%";
  var tk=getDayKey(pd);
  if(!s.completed)s.completed={};
  if(!s.customTasks)s.customTasks={};
  var sd=document.getElementById("studyContent");
  var ss=document.getElementById("studySection");
  if(td.s){
    ss.style.display="";
    var di=tk+"_study";
    var dn=s.completed[di]===true;
    sd.innerHTML='<div class="task-item"><div class="checkbox'+(dn?' checked':'')+'" onclick="toggleTask(\''+di+'\')"></div><div class="task-text'+(dn?' done':'')+'"><span class="task-label">新学习</span>'+td.s+'</div></div>'
  }else{ss.style.display="none"}
  var rd=document.getElementById("reviewContent");
  if(td.r&&td.r.length>0){
    rd.innerHTML=td.r.map(function(r){
      var di=tk+"_review_"+r.rd;
      var dn=s.completed[di]===true;
      return '<div class="task-item"><div class="checkbox'+(dn?' checked':'')+'" onclick="toggleTask(\''+di+'\')"></div><div class="task-text'+(dn?' done':'')+'"><span class="task-label">复习</span>'+r.rs+'<div style="font-size:11px;color:#99b0c5;margin-top:2px">第'+r.rd+'天</div></div></div>'
    }).join("")
  }else{rd.innerHTML='<div class="empty-state"><div class="icon">🎯</div><div>今天没有复习任务</div></div>'}
  renderCustomTasks(s,tk);
  updateStats(s,tk,td)
}
function renderCustomTasks(s,tk){
  var tasks=s.customTasks[tk]||[];
  var div=document.getElementById("customTasks");
  if(tasks.length===0){div.innerHTML='<div class="empty-state"><div class="icon">📋</div><div>暂无其他任务</div></div>';return}
  div.innerHTML=tasks.map(function(t,i){
    var di=tk+"_custom_"+i;var dn=s.completed[di]===true;
    return '<div class="task-item"><div class="checkbox'+(dn?' checked':'')+'" onclick="toggleTask(\''+di+'\')"></div><div class="task-text'+(dn?' done':'')+'">'+t.text+'</div><div class="delete-btn" onclick="removeCustomTask('+i+')">×</div></div>'
  }).join("")
}
function updateStats(s,tk,td){
  var total=0;var done=0;
  if(td&&td.s){total++;if(s.completed[tk+"_study"])done++}
  if(td&&td.r){td.r.forEach(function(r){total++;if(s.completed[tk+"_review_"+r.rd])done++})}
  var tasks=s.customTasks[tk]||[];tasks.forEach(function(t,i){total++;if(s.completed[tk+"_custom_"+i])done++});
  document.getElementById("completedCount").textContent=done;
  document.getElementById("totalCount").textContent=total
}
function startPlan(){
  var s=getState();
  if(s&&s.startDate&&!confirm("已有进度，确定重新开始吗？"))return;
  var t=new Date();var ns={startDate:t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0")+"-"+String(t.getDate()).padStart(2,"0"),completed:{},customTasks:{}};
  saveState(ns);render()
}
function toggleTask(id){
  var s=getState();if(!s)return;
  if(!s.completed)s.completed={};s.completed[id]=!s.completed[id];saveState(s);render()
}
function addCustomTask(){
  var inp=document.getElementById("newTaskInput");var txt=inp.value.trim();if(!txt)return;
  var s=getState();if(!s)return;
  var pd=getTodayPlanDay();var tk=getDayKey(pd);
  if(!s.customTasks)s.customTasks={};if(!s.customTasks[tk])s.customTasks[tk]=[];
  s.customTasks[tk].push({text:txt});saveState(s);inp.value="";render()
}
function removeCustomTask(idx){
  var s=getState();if(!s)return;
  var pd=getTodayPlanDay();var tk=getDayKey(pd);
  if(!s.customTasks[tk])return;
  s.customTasks[tk].splice(idx,1);
  var di=tk+"_custom_"+idx;delete s.completed[di];
  for(var i=idx;i<=s.customTasks[tk].length;i++){
    var ok=tk+"_custom_"+(i+1);var nk=tk+"_custom_"+i;
    if(s.completed[ok]!==undefined){s.completed[nk]=s.completed[ok];delete s.completed[ok]}
    else{delete s.completed[nk]}
  }
  saveState(s);render()
}
function prevDay(){
  var s=getState();if(!s)return;
  var pd=getTodayPlanDay();if(s.viewDay!==undefined)pd=s.viewDay;
  if(pd>1){pd--;s.viewDay=pd;saveState(s);render()}
}
function nextDay(){
  var s=getState();if(!s)return;
  var pd=getTodayPlanDay();if(s.viewDay!==undefined)pd=s.viewDay;
  if(pd<86){pd++;s.viewDay=pd;saveState(s);render()}
}
function goToToday(){
  var s=getState();if(!s)return;
  delete s.viewDay;saveState(s);render()
}
function confirmReset(){
  if(!confirm("确定要重置所有进度吗？这将清除所有学习记录、自定义任务和浏览历史。"))return;
  localStorage.removeItem("neike_plan_state");
  document.getElementById("startScreen").style.display="";
  document.getElementById("mainContent").style.display="none";
  var h1=document.querySelector(".start-screen h1");
  var p=document.querySelector(".start-screen p");
  var btn=document.querySelector(".start-btn");
  if(h1)h1.textContent="内科滚动复习计划";
  if(p)p.innerHTML="基于艾宾浩斯遗忘曲线，86天完整复习旅程。<br>每天推送学习内容与复习计划，点击打勾完成，进度随时可见。";
  if(btn)btn.textContent="开始计划"
}
document.addEventListener("DOMContentLoaded",function(){
  render();
  var n=new Date();var t=new Date(n);
  t.setDate(t.getDate()+1);t.setHours(0,0,0,0);
  setTimeout(function(){render();setInterval(render,3600000)},t-n+1000)
})
</script>
</body>
</html>
